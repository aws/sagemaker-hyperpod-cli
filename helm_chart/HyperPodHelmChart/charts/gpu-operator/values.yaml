gpu-operator:
  enabled: true
  operator:
    image: "mirror-gpu-operator"
    version: "v26.3.1"
    tolerations:
      - operator: "Exists"
    initContainer:
      enabled: false
  mig:
    strategy: mixed
  driver:
    enabled: false
  manager:
    enabled: false
  toolkit:
    image: "container-toolkit"
    version: "v1.19.0"
  devicePlugin:
    enabled: true
    image: "mirror-k8s-device-plugin"
    version: "v0.19.0"
  dcgm:
    enabled: false
  dcgmExporter:
    enabled: false
  gfd:
    image: "mirror-k8s-device-plugin"
    version: "v0.19.0"
  migManager:
    image: "k8s-mig-manager"
    version: "v0.14.0"
    config:
      create: true
      name: "default-mig-config"
    env:
      - name: WITH_REBOOT
        value: "true"
  validator:
    image: "gpu-operator-validator"
    version: "v26.3.1"
  vgpuDeviceManager:
    enabled: false
  vfioManager:
    enabled: false
  sandboxDevicePlugin:
    enabled: false
  node-feature-discovery:
    master:
      tolerations:
        - operator: "Exists"
    worker:
      tolerations:
        - operator: "Exists"
    gc:
      tolerations:
        - operator: "Exists"
  daemonsets:
    tolerations:
      - operator: Exists
