# Case 1-2: Model on NVMe on ALL nodes, S3 + prefetch ON
# Custom initContainer copies NVMe → RAM (model-weights-copy emptyDir). Worker reads from RAM.
apiVersion: inference.sagemaker.aws.amazon.com/v1
kind: InferenceEndpointConfig
metadata:
  name: case1-2-s3-prefetch-on
  namespace: default
spec:
  endpointName: case1-2-s3-prefetch-on
  modelName: Qwen2.5-VL-7B-Instruct
  invocationEndpoint: v1/chat/completions
  replicas: 1
  modelSourceConfig:
    modelSourceType: s3
    s3Storage:
      bucketName: <YOUR_TLS_BUCKET>
      region: us-east-2
    prefetchEnabled: true
  kubernetes:
    initContainers:
      - name: nvme-to-ram
        image: public.ecr.aws/amazonlinux/amazonlinux:2023
        command: ["/bin/bash", "-c"]
        args:
          - |
            echo "Copying model from NVMe to RAM..."
            cp -r /nvme/* /model/
            echo "Done. $(du -sh /model | cut -f1) copied."
        volumeMounts:
          - name: nvme-source
            mountPath: /nvme
            readOnly: true
          - name: model-weights-copy
            mountPath: /model
    volumes:
      - name: nvme-source
        hostPath:
          path: /opt/dlami/nvme/Qwen2.5-VL-7B-Instruct/Qwen2.5-VL-7B-Instruct
          type: Directory
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - <YOUR_HYPERPOD_NODE>
  loadBalancer:
    healthCheckPath: /health
  worker:
    image: lmcache/vllm-openai:latest
    args:
      - /opt/ml/model
      - --max-model-len
      - "15000"
      - --tensor-parallel-size
      - "1"
    modelInvocationPort:
      containerPort: 8000
      name: http
    modelVolumeMount:
      name: model-weights
      mountPath: /opt/ml/model
    resources:
      limits:
        nvidia.com/gpu: "1"
      requests:
        cpu: "6"
        memory: 30Gi
        nvidia.com/gpu: "1"
    environmentVariables:
      - name: PYTHONHASHSEED
        value: "123"
      - name: VLLM_REQUEST_TIMEOUT
        value: "600"
